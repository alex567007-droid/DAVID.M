<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire David !</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f0c040;
            --gold2: #ffd700;
            --fire: #ff4d00;
            --crystal: #67e8f9;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1f;
            color: #e0d0ff;
            font-family: 'Cinzel', serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Background Effects */
        #stars, #crystals { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 4s infinite; }
        @keyframes twinkle { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

        .crystal {
            position: absolute;
            font-size: 2.5rem;
            animation: float 12s infinite linear;
            opacity: 0.15;
            filter: drop-shadow(0 0 20px var(--crystal));
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 1;
            background: linear-gradient(rgba(10,10,31,0.7), rgba(20,10,40,0.85)),
                        url('https://images.unsplash.com/photo-1616588587684-9b4e1e1e5e5f?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover;
        }

        .hero-content h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(3.5rem, 12vw, 10rem);
            line-height: 0.85;
            background: linear-gradient(135deg, #ffd700, #ffaa00, #ff4d00, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(255,215,0,0.8);
            animation: titleGlow 4s ease-in-out infinite alternate;
        }

        .hero-content .name {
            font-size: clamp(5rem, 16vw, 14rem);
            font-weight: 900;
            background: linear-gradient(180deg, #ffffff, #ffd700, #ff8800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: nameFloat 6s ease-in-out infinite;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 40px #ffd700; }
            to { text-shadow: 0 0 80px #ff00aa, 0 0 120px #ff4d00; }
        }
        @keyframes nameFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        .subtitle {
            font-size: 1.4rem;
            letter-spacing: 0.5em;
            color: #67e8f9;
            margin: 20px 0 40px;
            text-transform: uppercase;
        }

        /* Visual Gallery */
        .visuals {
            padding: 80px 20px;
            background: #0f0b1f;
            position: relative;
            z-index: 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            height: 380px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 3px solid rgba(240, 192, 64, 0.4);
            transition: all 0.4s;
        }
        .card:hover {
            transform: scale(1.05) rotate(2deg);
            border-color: var(--gold2);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.5);
        }

        .card img, .card::before {
            position: absolute;
            inset: 0;
            object-fit: cover;
            transition: all 0.6s;
        }
        .card:hover img { transform: scale(1.15); }

        .card-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 30px 20px 20px;
            font-size: 1.4rem;
            text-align: center;
            font-family: 'Cinzel Decorative', cursive;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.1rem;
            color: #ffd700;
            letter-spacing: 0.3em;
        }

        .sword-left, .sword-right {
            position: absolute;
            font-size: 6rem;
            opacity: 0.1;
            z-index: 0;
            animation: swordFloat 15s infinite linear;
        }
        .sword-left { left: 5%; top: 30%; transform: rotate(-30deg); }
        .sword-right { right: 5%; top: 50%; transform: rotate(30deg); }
    </style>
</head>
<body>

    <!-- Background -->
    <div id="stars"></div>
    <div id="crystals"></div>

    <!-- HERO -->
    <section class="hero">
        <div class="sword-left">🗡️</div>
        <div class="sword-right">🗡️</div>
        
        <div class="hero-content">
            <p class="subtitle">✦ Légende Éveillée ✦</p>
            <h1>JOYEUX<br>ANNIVERSAIRE</h1>
            <div class="name">DAVID</div>
            <p style="margin-top:30px; font-size:1.5rem; color:#a5b4fc;">Level Up • New Game +</p>
        </div>
    </section>

    <!-- Visual Cards -->
    <section class="visuals">
        <div class="grid">
            <div class="card">
                <img src="https://picsum.photos/id/1015/800/600" alt="Final Fantasy">
                <div class="card-label">💎 CRISTAL ULTIME</div>
            </div>
            <div class="card">
                <img src="https://picsum.photos/id/201/800/600" alt="Fire Emblem">
                <div class="card-label">🔥 EMBLÈME DE FEU</div>
            </div>
            <div class="card">
                <img src="https://picsum.photos/id/866/800/600" alt="Chocobo">
                <div class="card-label">🐤 CHOCOBO DORÉ</div>
            </div>
            <div class="card">
                <img src="https://picsum.photos/id/1016/800/600" alt="Hero">
                <div class="card-label">⚔️ HÉROS LÉGENDAIRE</div>
            </div>
        </div>
    </section>

    <footer>
        Que ton année soit remplie de victoires épiques et de cristaux brillants ✨<br>
        Final Fantasy • Fire Emblem • RPG Forever
    </footer>

    <script>
        // Stars
        const stars = document.getElementById('stars');
        for (let i = 0; i < 250; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 3 + 0.8;
            s.style.cssText = `
                width: ${size}px; height: ${size}px;
                top: ${Math.random()*100}%; left: ${Math.random()*100}%;
                animation-delay: ${Math.random()*5}s;
            `;
            stars.appendChild(s);
        }

        // Floating Crystals
        const crystals = document.getElementById('crystals');
        const crystalEmojis = ['💎','🔷','🧿','✨','🔮'];
        for (let i = 0; i < 18; i++) {
            const c = document.createElement('div');
            c.className = 'crystal';
            c.textContent = crystalEmojis[Math.floor(Math.random()*crystalEmojis.length)];
            c.style.left = Math.random() * 100 + '%';
            c.style.animationDuration = (Math.random() * 12 + 10) + 's';
            c.style.animationDelay = '-' + Math.random() * 15 + 's';
            crystals.appendChild(c);
        }

        // Confetti on click
        document.addEventListener('click', () => {
            confetti = window.confetti || (() => {});
            confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</body>
</html>
