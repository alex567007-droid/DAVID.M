<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire David !</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f0c040;
            --gold2: #ffd700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1f;
            color: #e0d0ff;
            font-family: 'Cinzel', serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Background Effects */
        #stars, #crystals { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 4s infinite; }
        @keyframes twinkle { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

        .crystal {
            position: absolute;
            font-size: 3rem;
            animation: floatCrystal 18s infinite linear;
            opacity: 0.2;
            filter: drop-shadow(0 0 30px #67e8f9);
        }
        @keyframes floatCrystal { 0% { transform: translateY(100vh) rotate(0deg); } 100% { transform: translateY(-100vh) rotate(720deg); } }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 1;
            background: linear-gradient(rgba(10,10,31,0.75), rgba(30,10,50,0.9)),
                        url('https://images.unsplash.com/photo-1616588587684-9b4e1e1e5e5f?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover;
        }

        .hero-content h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(4rem, 13vw, 11rem);
            line-height: 0.85;
            background: linear-gradient(135deg, #ffd700, #ffaa00, #ff4d00, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 80px rgba(255,215,0,0.9);
        }

        .hero-content .name {
            font-size: clamp(6rem, 18vw, 16rem);
            font-weight: 900;
            background: linear-gradient(180deg, #fff, #ffd700, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: nameFloat 8s ease-in-out infinite;
        }
        @keyframes nameFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-35px); } }

        .subtitle { 
            font-size: 1.8rem; 
            letter-spacing: 0.8em; 
            color: #67e8f9; 
            margin-bottom: 40px;
            text-shadow: 0 0 20px #67e8f9;
        }

        /* Visual Cards */
        .visuals {
            padding: 100px 20px 120px;
            background: #0f0b1f;
            position: relative;
            z-index: 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            height: 460px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 5px solid rgba(240, 192, 64, 0.6);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: all 0.6s;
        }
        .card:hover {
            transform: scale(1.1) rotate(3deg);
            border-color: #ffd700;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.7);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s;
        }
        .card:hover img { transform: scale(1.15); }

        .card-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(10,10,30,0.95));
            padding: 40px 20px 30px;
            text-align: center;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.9rem;
            text-shadow: 0 0 20px black;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.4rem;
            color: #ffd700;
            letter-spacing: 0.3em;
        }
    </style>
</head>
<body>

    <div id="stars"></div>
    <div id="crystals"></div>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <p class="subtitle">✦ LÉGENDE ÉVEILLÉE ✦</p>
            <h1>JOYEUX<br>ANNIVERSAIRE</h1>
            <div class="name">DAVID</div>
        </div>
    </section>

    <!-- VISUAL GAME CARDS -->
    <section class="visuals">
        <div class="grid">
            <div class="card">
                <img src="https://wallpapercave.com/wp/wp4065889.jpg" alt="Final Fantasy Crystal">
                <div class="card-label">💎 FINAL FANTASY</div>
            </div>

            <div class="card">
                <img src="https://images.alphacoders.com/134/1340583.jpg" alt="Fire Emblem">
                <div class="card-label">🔥 FIRE EMBLEM</div>
            </div>

            <div class="card">
                <img src="https://wallpapercave.com/wp/wp4065898.jpg" alt="Chocobo">
                <div class="card-label">🐤 CHOCOBO</div>
            </div>

            <div class="card">
                <img src="https://images8.alphacoders.com/134/1340580.jpg" alt="Epic Battle">
                <div class="card-label">⚔️ HÉROS MYTHIQUE</div>
            </div>
        </div>
    </section>

    <footer>
        QUE TA QUÊTE CONTINUE AVEC GLOIRE ✨
    </footer>

    <script>
        // Stars
        const stars = document.getElementById('stars');
        for (let i = 0; i < 250; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 3.5 + 1;
            s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*5}s;`;
            stars.appendChild(s);
        }

        // Floating Crystals & Emblems
        const crystals = document.getElementById('crystals');
        const icons = ['💎','🔮','🗡️','🛡️','🔥','✨','🐤'];
        for (let i = 0; i < 22; i++) {
            const c = document.createElement('div');
            c.className = 'crystal';
            c.textContent = icons[Math.floor(Math.random()*icons.length)];
            c.style.left = Math.random() * 100 + '%';
            c.style.animationDuration = (14 + Math.random() * 12) + 's';
            c.style.animationDelay = '-' + Math.random() * 25 + 's';
            crystals.appendChild(c);
        }
    </script>
</body>
</html>
